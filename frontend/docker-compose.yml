services:
  postgres:
    image: postgres:16-alpine
    container_name: taskforge-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge_secret
      POSTGRES_DB: taskforge
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
